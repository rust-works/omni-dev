scopes:
  - name: "ci"
    description: "CI/CD pipelines and GitHub Actions workflows"
    examples: ["ci: add commit validation workflow", "ci: fix release pipeline"]
    file_patterns: [".github/**"]
  - name: "claude"
    description: "Claude AI client implementation and integration"
    examples: ["claude: add contextual prompting", "claude: fix API error handling"]
    file_patterns: ["src/claude/**", "src/data/context.rs"]
  - name: "atlassian"
    description: "Atlassian JIRA/Confluence integration and API client"
    examples: ["atlassian: add post_json to AtlassianClient", "atlassian: implement jira search"]
    file_patterns: ["src/atlassian/**", "src/cli/atlassian/**"]
  - name: "datadog"
    description: "Datadog monitoring integration and REST API client"
    examples: ["datadog: add get_parsed to DatadogClient", "datadog: implement monitor search"]
    file_patterns: ["src/datadog/**", "src/cli/datadog.rs", "src/cli/datadog/**"]
  - name: "cli"
    description: "Command-line interface and argument parsing"
    examples: ["cli: add twiddle contextual options", "cli: improve help text"]
    file_patterns: ["src/cli/**", "src/main.rs"]
  - name: "browser"
    description: "Browser bridge: drive authenticated requests through a browser tab"
    examples: ["browser: add WebSocket bridge", "browser: support binary response bodies"]
    file_patterns: ["src/browser/**", "src/cli/browser/**", "src/cli/browser.rs"]
  - name: "snowflake"
    description: "Snowflake query service: authenticate-once SSO sessions on the daemon"
    examples: ["snowflake: add account-agnostic session engine", "snowflake: map arbitrary rows to JSON"]
    file_patterns: ["src/snowflake/**", "src/cli/snowflake.rs", "src/daemon/services/snowflake.rs"]
  - name: "daemon"
    description: "Daemon supervisor: control socket, lifecycle, service registry, menu-bar tray"
    examples: ["daemon: add service registry", "daemon: update tray menu items in place"]
    file_patterns: ["src/daemon/**", "src/cli/daemon.rs", "src/cli/daemon/**"]
  - name: "git"
    description: "Git operations and repository analysis"
    examples: ["git: enhance commit parsing", "git: add branch analysis"]
    file_patterns: ["src/git/**"]
  - name: "mcp"
    description: "MCP server implementation and tool handlers"
    examples: ["mcp: add git_view_commits tool", "mcp: wire up stdio transport"]
    file_patterns: ["src/mcp/**", "src/mcp.rs", "src/mcp_server.rs"]
  - name: "request-log"
    description: "Local append-only invocation + HTTP request log and its reader"
    examples: ["request-log: add append-only log writer", "request-log: add omni-dev log reader"]
    file_patterns: ["src/request_log.rs", "src/cli/log.rs", "src/cli/log/**"]
  - name: "resources"
    description: "Embedded reference content registry shared by CLI and MCP"
    examples: ["resources: add jfm spec entry", "resources: extract specs into shared registry"]
    file_patterns: ["src/resources.rs", "src/resources/**"]
  - name: "data"
    description: "Data structures and serialization"
    examples: ["data: add context structures", "data: improve YAML output"]
    file_patterns: ["src/data/**"]
  - name: "docs"
    description: "Documentation and planning"
    examples: ["docs: update twiddle plan", "docs: add context intelligence spec"]
    file_patterns: ["docs/**", "*.md", "README.md"]
  - name: "release"
    description: "Release process, versioning, and publishing"
    examples: ["release: bump version to 1.2.0", "release: update changelog"]
    file_patterns: [".github/workflows/release.yml", "CHANGELOG.md", "Cargo.toml"]
  - name: "scopes"
    description: "Commit scope definitions and configuration"
    examples: ["scopes: add release scope", "scopes: update file patterns"]
    file_patterns: [".omni-dev/scopes.yaml"]
  - name: "website"
    description: "Project promo site sources under website/"
    examples: ["website: add landing page", "website: tweak SCSS theme"]
    file_patterns: ["website/**"]
  - name: "workflows"
    description: "GitHub Actions workflow files"
    examples: ["workflows: add commit check on push", "workflows: fix release permissions"]
    file_patterns: [".github/workflows/**"]