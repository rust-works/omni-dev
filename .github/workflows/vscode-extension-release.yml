name: VS Code extension release

# Publishes the companion extension in editors/vscode/ to the VS Code
# Marketplace (vsce) and Open VSX (ovsx). Deliberately kept separate from
# vscode-extension.yml (which runs the PR/main checks): this file only ever
# runs on a dedicated `vscode-v*` tag or a manual dispatch — NEVER on a `main`
# push — so a routine merge can never publish.
#
# Release flow (extension version is independent of the Rust crate):
#   1. bump `version` in editors/vscode/package.json (and package-lock.json)
#   2. commit, then tag the merge commit `vscode-v<version>` (e.g. vscode-v0.2.1)
#   3. push the tag — this workflow verifies tag == package.json version,
#      re-runs typecheck/build/test/package, then publishes the same .vsix to
#      both registries.
#
# One-time prerequisites (maintainer, not code): at least one publish token must
# be set. VSCE_PAT publishes to the VS Code Marketplace (needs an Azure DevOps
# publisher whose id matches `"publisher"` in package.json); OVSX_PAT publishes to
# Open VSX (needs the matching Open VSX namespace). Each registry is published to
# only if its token is present — a missing token skips that registry (a notice,
# not a failure) — so Marketplace-only, Open-VSX-only, and both are all valid,
# green outcomes. The run fails only if neither token is set. See
# editors/vscode/README.md.
on:
  push:
    tags:
      - 'vscode-v*'
  workflow_dispatch:

permissions:
  contents: read

# Never let two publishes race for the same version.
concurrency:
  group: vscode-extension-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editors/vscode
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      # Each registry is optional and gated on its own token; at least one must be
      # present or there is nothing to publish. A missing token skips that registry
      # (a notice, not a failure), so Marketplace-only, Open-VSX-only, and both are
      # all valid, green outcomes.
      - name: Verify at least one publish token is present
        id: secrets
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ] && [ -z "$OVSX_PAT" ]; then
            echo "::error::No publish token set. Add VSCE_PAT (VS Code Marketplace) and/or OVSX_PAT (Open VSX) under Settings → Secrets and variables → Actions before releasing. See editors/vscode/README.md."
            exit 1
          fi
          if [ -n "$VSCE_PAT" ]; then
            echo "has_vsce=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_vsce=false" >> "$GITHUB_OUTPUT"
            echo "::notice::VSCE_PAT is not set — skipping the VS Code Marketplace publish."
          fi
          if [ -n "$OVSX_PAT" ]; then
            echo "has_ovsx=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_ovsx=false" >> "$GITHUB_OUTPUT"
            echo "::notice::OVSX_PAT is not set — skipping the Open VSX publish."
          fi

      # On a tag push, the tag is the source of truth for what we intend to
      # ship; refuse to publish if package.json disagrees. Skipped for a manual
      # dispatch (no tag), which publishes whatever version is on the ref.
      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/vscode-v')
        run: |
          tag_version="${GITHUB_REF#refs/tags/vscode-v}"
          pkg_version="$(node -p "require('./package.json').version")"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::Tag vscode-v${tag_version} does not match editors/vscode/package.json version ${pkg_version}. Bump the version and retag."
            exit 1
          fi
          echo "Releasing omni-dev ${pkg_version} (tag vscode-v${tag_version})"

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Package .vsix
        run: npm run package

      # Resolve the single packaged artifact so both registries get the exact
      # same bytes (rather than each re-packaging independently).
      - name: Resolve packaged .vsix
        id: vsix
        run: |
          shopt -s nullglob
          files=(*.vsix)
          if [ ${#files[@]} -ne 1 ]; then
            echo "::error::Expected exactly one .vsix, found ${#files[@]}: ${files[*]}"
            exit 1
          fi
          echo "path=${files[0]}" >> "$GITHUB_OUTPUT"
          echo "Packaged ${files[0]}"

      - name: Publish to VS Code Marketplace
        if: steps.secrets.outputs.has_vsce == 'true'
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npm run publish:vsce -- --packagePath "${{ steps.vsix.outputs.path }}"

      - name: Publish to Open VSX
        if: steps.secrets.outputs.has_ovsx == 'true'
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npm run publish:ovsx -- "${{ steps.vsix.outputs.path }}"

      # Keep the exact published artifact for provenance / manual re-install.
      - name: Upload published .vsix artifact
        uses: actions/upload-artifact@v7
        with:
          name: omni-dev-vsix-${{ github.ref_name }}
          path: editors/vscode/*.vsix
          if-no-files-found: error
