name: VS Code extension

# Scoped to the companion extension only — the Rust CI in ci.yml is untouched
# and never descends into editors/. No committed lockfile yet, so this uses
# `npm install` and does not enable the npm cache (which needs a lock file).
on:
  push:
    branches: [main]
    paths:
      - 'editors/vscode/**'
      - '.github/workflows/vscode-extension.yml'
  pull_request:
    branches: [main]
    paths:
      - 'editors/vscode/**'
      - '.github/workflows/vscode-extension.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editors/vscode
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Package .vsix
        run: npm run package

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: omni-dev-worktrees-vsix
          path: editors/vscode/*.vsix
          if-no-files-found: error
